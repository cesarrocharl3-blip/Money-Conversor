<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BJ+Cree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="java-copy.js" defer>    </script>
    <title>Conversor de Moedas</title>

</head>

<body>

    <header>
        <img class="logo" src="/assets/gif2.gif" alt="Gif de dinheiro">

    </header>

    <div class="main2"> 
    <main>

        <label>

            <p class="l1"> <b>Converter de:</b> </p>

            <select class="c1">
                <option value="dolar1">US$ Dólar Americano</option>
                <option value="euro1">€ Euro</option>
                <option value="real1" selected>R$ Real Brasileiro</option>
                <option value="libra1">£ Libra Esterlina</option>
                <option value="peso1">$ Peso Argentino</option>
                <option value="bitcoin1">₿ Bitcoin</option>

            </select>

        </label>

        <label>

            <p class="l1"> <b>Para:</b> </p>

            <select class="c2">
                <option value="dolar2">US$ Dólar Americano</option>
                <option value="euro2">€ Euro</option>
                <option value="real2">R$ Real Brasileiro</option>
                <option value="libra2">£ Libra Esterlina</option>
                <option value="peso2">$ Peso Argentino</option>
                <option value="bitcoin2">₿ Bitcoin</option>
            </select>

        </label>
        <br>
        <input class="input1" type="number" placeholder="R$ 1000,00"> <br>

        <button class="button1"><b>Converter</b></button>

        <section class="section2"> 
        <section>
            <div>
                <img class="coin" src="/assets/real4.png" alt="img-real">
                <p class="coin1">R$ Real Brasileiro</p>
                <p class="coin2">R$ 0,00</p>
            </div>

            <img class="arrow" src="/assets/seta4.png" alt="seta">

            <div>
                <img class="coins" src="/assets/dolar4.png" alt="img-dólar">
                <p class="coins1">US$ Dólar Americano</p>
                <p class="coins2">US$ 0,00</p>
            </div>

        </section>
        </section>

    </main>
    </div>




</body>

</html>
